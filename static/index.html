<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jambot AI Council</title>
  <style>
    :root {
      --bg: #0a0a0b;
      --surface: #18181b;
      --surface-hi: #1f1f23;
      --fg: #fafafa;
      --muted: #a1a1aa;
      --subtle: #27272a;
      --border: #27272a;
      --border-strong: #3f3f46;
      --pragmatist: #60a5fa;
      --skeptic: #f87171;
      --theorist: #a78bfa;
      --synth: #34d399;
    }
    @media (prefers-color-scheme: dark) { /* same — already dark */ }
    * { box-sizing: border-box; }
    html, body { height: auto; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
      max-width: 980px;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    /* Header / brand */
    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    header .mark {
      flex: 0 0 auto;
      width: 56px;
      height: 56px;
    }
    header h1 {
      font-size: 1.85rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin: 0;
      line-height: 1.1;
    }
    header .tagline {
      margin: 0.25rem 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* Form */
    form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 2rem;
      padding: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    form:focus-within {
      border-color: var(--border-strong);
    }
    textarea {
      width: 100%;
      min-height: 88px;
      padding: 0.5rem;
      font-family: inherit;
      font-size: 1rem;
      line-height: 1.5;
      border: none;
      background: transparent;
      color: var(--fg);
      resize: vertical;
    }
    textarea:focus { outline: none; }
    textarea::placeholder { color: var(--muted); }
    form .row {
      display: flex;
      justify-content: flex-end;
    }
    button {
      padding: 0.6rem 1.25rem;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: 8px;
      background: var(--fg);
      color: var(--bg);
      cursor: pointer;
      transition: background 120ms ease, transform 80ms ease;
    }
    button:hover:not(:disabled) { background: #e4e4e7; }
    button:active:not(:disabled) { transform: translateY(1px); }
    button:disabled { opacity: 0.55; cursor: progress; }

    /* Round sections */
    .round {
      margin: 2rem 0 0;
      animation: slideIn 280ms ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .round-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.85rem;
    }
    .round-num {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
      background: var(--subtle);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
    }
    .round-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--fg);
    }

    /* Agent grid */
    .agents { display: grid; gap: 0.85rem; }
    @media (min-width: 760px) {
      .agents { grid-template-columns: repeat(3, 1fr); }
    }
    .agent {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.95rem 1rem 1.1rem;
      background: var(--surface);
      transition: border-color 200ms ease, background 200ms ease;
      animation: cardIn 220ms ease;
    }
    .agent.streaming { background: var(--surface-hi); border-color: var(--border-strong); }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .agent::before {
      content: "";
      position: absolute;
      top: -1px; left: -1px; right: -1px;
      height: 3px;
      background: var(--border);
      border-top-left-radius: 10px;
      border-top-right-radius: 10px;
    }
    .agent.Pragmatist::before { background: var(--pragmatist); }
    .agent.Skeptic::before { background: var(--skeptic); }
    .agent.Theorist::before { background: var(--theorist); }
    .agent-name {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }
    .agent.Pragmatist .agent-name { color: var(--pragmatist); }
    .agent.Skeptic .agent-name { color: var(--skeptic); }
    .agent.Theorist .agent-name { color: var(--theorist); }

    .agent-text {
      white-space: pre-wrap;
      font-size: 0.94rem;
      line-height: 1.6;
      color: #e4e4e7;
    }
    .agent-text:empty::before {
      content: "thinking…";
      color: var(--muted);
      font-style: italic;
    }

    /* Streaming caret */
    .agent.streaming .agent-text::after {
      content: "";
      display: inline-block;
      width: 2px;
      height: 0.95em;
      background: currentColor;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.95s steps(2, end) infinite;
    }
    .agent.Pragmatist.streaming .agent-text::after { background: var(--pragmatist); }
    .agent.Skeptic.streaming .agent-text::after { background: var(--skeptic); }
    .agent.Theorist.streaming .agent-text::after { background: var(--theorist); }
    @keyframes blink { 50% { opacity: 0; } }

    /* Synthesis */
    .synthesis {
      margin-top: 2.5rem;
      padding: 1.5rem 1.75rem 1.75rem;
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      background:
        radial-gradient(ellipse at top, rgba(52, 211, 153, 0.08) 0%, transparent 60%),
        var(--surface);
      animation: slideIn 280ms ease;
    }
    .synthesis-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.6rem;
    }
    .synthesis-badge {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--synth);
      background: rgba(52, 211, 153, 0.12);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
    }
    .synthesis h2 {
      font-size: 1.15rem;
      font-weight: 700;
      margin: 0;
      color: var(--fg);
      letter-spacing: -0.01em;
    }
    .synthesis .agent-text { font-size: 1rem; color: #f4f4f5; }
    .synthesis.streaming .agent-text::after {
      content: "";
      display: inline-block;
      width: 2px;
      height: 0.95em;
      background: var(--synth);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.95s steps(2, end) infinite;
    }

    .error {
      margin-top: 1.25rem;
      padding: 0.85rem 1rem;
      border: 1px solid #7f1d1d;
      border-left: 3px solid #f87171;
      border-radius: 8px;
      background: rgba(220, 38, 38, 0.08);
      color: #fca5a5;
      font-size: 0.92rem;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <svg class="mark" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="20" cy="7" r="4" fill="#60a5fa" />
      <circle cx="7" cy="29" r="4" fill="#f87171" />
      <circle cx="33" cy="29" r="4" fill="#a78bfa" />
      <circle cx="20" cy="22" r="3" fill="#34d399" />
      <path d="M 20 7 L 7 29 M 20 7 L 33 29 M 7 29 L 33 29"
            stroke="#3f3f46" stroke-width="0.6" fill="none" />
    </svg>
    <div>
      <h1>Jambot AI Council</h1>
      <p class="tagline">Three AI minds deliberate. A fourth synthesizes.</p>
    </div>
  </header>

  <form id="form">
    <textarea
      id="question"
      placeholder="Ask the council something worth deliberating on…"
      required
    ></textarea>
    <div class="row">
      <button type="submit" id="submit">Convene the council</button>
    </div>
  </form>

  <div id="output"></div>

  <footer>powered by DeepSeek · streaming live</footer>

  <script>
    const form = document.getElementById("form");
    const submit = document.getElementById("submit");
    const output = document.getElementById("output");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const question = document.getElementById("question").value.trim();
      if (!question) return;

      output.innerHTML = "";
      submit.disabled = true;
      submit.textContent = "Deliberating…";

      try {
        const resp = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          let idx;
          while ((idx = buffer.indexOf("\n\n")) !== -1) {
            const frame = buffer.slice(0, idx);
            buffer = buffer.slice(idx + 2);
            for (const line of frame.split("\n")) {
              if (line.startsWith("data: ")) {
                handleEvent(JSON.parse(line.slice(6)));
              }
            }
          }
        }
      } catch (err) {
        showError(err.message || String(err));
      } finally {
        submit.disabled = false;
        submit.textContent = "Convene the council";
      }
    });

    function ensureRound(round) {
      const id = `round-${round}`;
      let el = document.getElementById(id);
      if (el) return el.querySelector(".agents");

      el = document.createElement("section");
      el.id = id;
      el.className = "round";

      const header = document.createElement("div");
      header.className = "round-header";
      const num = document.createElement("span");
      num.className = "round-num";
      num.textContent = round === 0 ? "ROUND 1" : `ROUND ${round + 1}`;
      const title = document.createElement("span");
      title.className = "round-title";
      title.textContent = round === 0 ? "Opening positions" : "Critique & revise";
      header.appendChild(num);
      header.appendChild(title);
      el.appendChild(header);

      const grid = document.createElement("div");
      grid.className = "agents";
      el.appendChild(grid);

      output.appendChild(el);
      return grid;
    }

    function ensureAgent(round, agent) {
      const id = `agent-${round}-${agent}`;
      let el = document.getElementById(id);
      if (el) return el;

      const grid = ensureRound(round);
      el = document.createElement("article");
      el.id = id;
      el.className = `agent ${agent}`;
      el.innerHTML = `<div class="agent-name">${agent}</div><div class="agent-text"></div>`;
      grid.appendChild(el);
      return el;
    }

    function ensureSynthesis() {
      let el = document.getElementById("synthesis");
      if (el) return el;
      el = document.createElement("section");
      el.id = "synthesis";
      el.className = "synthesis streaming";
      el.innerHTML = `
        <div class="synthesis-header">
          <span class="synthesis-badge">SYNTHESIS</span>
          <h2>Final answer</h2>
        </div>
        <div class="agent-text"></div>
      `;
      output.appendChild(el);
      return el;
    }

    function showError(msg) {
      const el = document.createElement("div");
      el.className = "error";
      el.textContent = `Error: ${msg}`;
      output.appendChild(el);
    }

    function handleEvent(event) {
      switch (event.type) {
        case "agent_start": {
          const el = ensureAgent(event.round, event.agent);
          el.classList.add("streaming");
          break;
        }
        case "agent_delta": {
          const el = ensureAgent(event.round, event.agent);
          el.querySelector(".agent-text").textContent += event.text;
          break;
        }
        case "agent_done": {
          const el = ensureAgent(event.round, event.agent);
          el.classList.remove("streaming");
          break;
        }
        case "synthesis_start":
          ensureSynthesis();
          break;
        case "synthesis_delta": {
          const el = ensureSynthesis();
          el.querySelector(".agent-text").textContent += event.text;
          break;
        }
        case "done": {
          const synth = document.getElementById("synthesis");
          if (synth) synth.classList.remove("streaming");
          break;
        }
        case "error":
          showError(event.message);
          break;
      }
    }
  </script>
</body>
</html>
